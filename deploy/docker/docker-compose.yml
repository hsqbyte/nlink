services:
  nlink:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: nlink
    restart: unless-stopped
    ports:
      - "7000:7000"     # TCP 控制通道
      - "7001:7001"     # 工作连接
      - "18080:18080"   # Dashboard
    volumes:
      - ./config:/app/config
      - nlink-data:/app/data

volumes:
  nlink-data:
