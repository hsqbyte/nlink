name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          LDFLAGS="-s -w -X main.Version=${VERSION}"
          mkdir -p release

          GOOS=darwin  GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o release/nlink-darwin-arm64 .
          GOOS=darwin  GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o release/nlink-darwin-amd64 .
          GOOS=linux   GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o release/nlink-linux-amd64 .
          GOOS=linux   GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o release/nlink-linux-arm64 .
          GOOS=windows GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o release/nlink-windows-amd64.exe .

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
