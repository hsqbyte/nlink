<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NLink - 登录</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
    background: #f5f5f7; display: flex; align-items: center; justify-content: center;
    min-height: 100vh; color: #1d1d1f;
  }
  .login-card {
    background: #fff; border-radius: 18px; padding: 48px 40px; width: 380px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08); text-align: center;
  }
  .login-card h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
  .login-card p { color: #86868b; font-size: 14px; margin-bottom: 32px; }
  .form-group { margin-bottom: 16px; text-align: left; }
  .form-group label { display: block; font-size: 13px; font-weight: 500; color: #6e6e73; margin-bottom: 6px; }
  .form-group input {
    width: 100%; padding: 12px 16px; border: 1px solid #d2d2d7; border-radius: 12px;
    font-size: 15px; outline: none; transition: border-color .2s;
    background: #fafafa;
  }
  .form-group input:focus { border-color: #0071e3; background: #fff; }
  .login-btn {
    width: 100%; padding: 14px; border: none; border-radius: 12px;
    background: #0071e3; color: #fff; font-size: 16px; font-weight: 600;
    cursor: pointer; margin-top: 8px; transition: background .2s;
  }
  .login-btn:hover { background: #005bb5; }
  .login-btn:disabled { background: #999; cursor: not-allowed; }
  .error-msg {
    color: #ff3b30; font-size: 13px; margin-top: 12px; min-height: 20px;
  }
</style>
</head>
<body>
<div class="login-card">
  <h1>NLink</h1>
  <p>请登录管理面板</p>
  <form id="loginForm" onsubmit="return doLogin(event)">
    <div class="form-group">
      <label>用户名</label>
      <input type="text" id="username" autocomplete="username" required autofocus>
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="login-btn" id="loginBtn">登录</button>
    <div class="error-msg" id="errorMsg"></div>
  </form>
</div>
<script>
async function doLogin(e) {
  e.preventDefault();
  var btn = document.getElementById('loginBtn');
  var err = document.getElementById('errorMsg');
  btn.disabled = true;
  err.textContent = '';
  try {
    var r = await fetch('/api/v1/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
      })
    });
    var j = await r.json();
    if (j.code === 200) {
      window.location.href = '/dashboard';
    } else {
      err.textContent = j.message || '登录失败';
    }
  } catch (ex) {
    err.textContent = '网络错误';
  } finally {
    btn.disabled = false;
  }
  return false;
}
</script>
</body>
</html>
