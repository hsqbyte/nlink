# golangci-lint 配置（保守默认，避免与现有代码风格冲突）
run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unused
    - gofmt
    - misspell

issues:
  exclude-dirs:
    - bin
    - data
    - docs
    - deploy
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
